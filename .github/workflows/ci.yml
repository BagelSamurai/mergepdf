name: CI

# Runs on every push to any branch, and on pull requests to main
on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run tests
    runs-on: windows-latest   # matches your target OS

    steps:
      # 1. Check out the code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"          # caches pip downloads between runs — faster CI

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e shared/

      # 4. Lint with ruff (catches syntax errors and style issues)
      - name: Lint
        run: ruff check shared/ desktop/ tests/

      # 5. Run tests
      - name: Test
        run: pytest tests/ -v